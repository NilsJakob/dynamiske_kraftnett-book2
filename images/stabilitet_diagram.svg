<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="600">

<style>
.box { fill:#f5f5f5; stroke:#333; stroke-width:1.2; }
.text { font-family: Arial; font-size:12px; text-anchor: middle; dominant-baseline: middle; }
.line { stroke:#333; stroke-width:1.2; fill:none; }
</style>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
  </marker>
</defs>

